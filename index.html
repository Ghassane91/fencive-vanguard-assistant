<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Fencive Vanguard — Assistant</title>
<style>
/* ── Reset & base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:         #07090f;
  --surface:    #0d1221;
  --surface2:   #111827;
  --border:     rgba(255,255,255,.07);
  --blue:       #2563eb;
  --blue-glow:  rgba(37,99,235,.35);
  --cyan:       #06b6d4;
  --purple:     #7c3aed;
  --text:       #e2eaf6;
  --muted:      #6b7da0;
  --muted2:     #3d4d6a;
  --radius:     18px;
  --header-h:   58px;
  --bar-h:      72px;
}
html, body { height: 100%; }
body {
  font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  overflow: hidden;
}
.hidden { display: none !important; }
button { font-family: inherit; cursor: pointer; border: none; outline: none; }

/* ── Layout ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 860px;
  margin: 0 auto;
}

/* ── Header ── */
header {
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: rgba(7,9,15,.8);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 10;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand img { height: 24px; filter: brightness(0) invert(1); opacity: .9; }
.brand .label {
  font-size: 11px;
  letter-spacing: 2.5px;
  color: var(--muted);
  text-transform: uppercase;
  font-weight: 500;
}
.header-actions { display: flex; align-items: center; gap: 8px; }
.btn-icon {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border);
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  transition: background .2s, color .2s;
}
.btn-icon:hover { background: rgba(255,255,255,.1); color: var(--text); }
.btn-voice {
  display: flex; align-items: center; gap: 8px;
  background: rgba(37,99,235,.15);
  border: 1px solid rgba(37,99,235,.4);
  color: #93c5fd;
  border-radius: 22px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 500;
  transition: background .2s, border-color .2s;
}
.btn-voice:hover { background: rgba(37,99,235,.25); border-color: rgba(37,99,235,.6); }
.voice-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #cfe7ff, #5aa6ff 55%, #2563eb);
  box-shadow: 0 0 6px 1px rgba(77,163,255,.6);
}

/* ── Messages ── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 18px 10px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 4px; }

/* Welcome state */
.welcome {
  margin: auto;
  text-align: center;
  color: var(--muted);
  font-size: 14px;
  max-width: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.welcome img { height: 40px; filter: brightness(0) invert(1); opacity: .8; }
.welcome p { line-height: 1.6; }
.suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 4px;
}
.sug-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: #93b4da;
  border-radius: 20px;
  padding: 7px 13px;
  font-size: 12.5px;
  transition: background .2s, border-color .2s;
  text-align: left;
  line-height: 1.4;
}
.sug-btn:hover { background: rgba(37,99,235,.15); border-color: rgba(37,99,235,.4); color: #bfd4f5; }

/* Bubbles */
.row { display: flex; align-items: flex-end; gap: 8px; }
.row.user { justify-content: flex-end; }
.avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: contain; padding: 3px; background: var(--surface2); border: 1px solid var(--border); flex-shrink: 0; margin-bottom: 2px; filter: brightness(0) invert(1); opacity: .8; }
.bubble {
  padding: 11px 15px;
  border-radius: var(--radius);
  font-size: 15px;
  line-height: 1.6;
  max-width: min(80%, 560px);
  white-space: pre-wrap;
  word-wrap: break-word;
  animation: fadeUp .25s ease;
}
@keyframes fadeUp { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }
.user .bubble {
  background: var(--blue);
  color: #fff;
  border-bottom-right-radius: 5px;
}
.bot .bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  color: #eef3fa;
  border-bottom-left-radius: 5px;
}
.typing .bubble { display: flex; gap: 5px; align-items: center; padding: 14px 18px; }
.typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: blink 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,60%,100%{opacity:.25} 30%{opacity:1} }

/* Language badge */
.lang-badge {
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 2px 7px;
  border: 1px solid var(--muted2);
  border-radius: 10px;
  margin-top: 5px;
  display: inline-block;
}
.row.user .lang-badge { align-self: flex-end; }

/* ── Input bar ── */
#bar {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  padding: 12px 18px 16px;
  border-top: 1px solid var(--border);
  background: rgba(7,9,15,.9);
  flex-shrink: 0;
}
#txt {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--muted2);
  border-radius: 22px;
  color: var(--text);
  padding: 12px 18px;
  font-size: 15px;
  outline: none;
  resize: none;
  max-height: 120px;
  font-family: inherit;
  line-height: 1.5;
  transition: border-color .2s;
}
#txt::placeholder { color: var(--muted2); }
#txt:focus { border-color: var(--blue); }
#send {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--blue);
  color: #fff;
  font-size: 18px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s, opacity .2s, transform .1s;
  box-shadow: 0 4px 12px var(--blue-glow);
}
#send:hover { background: #1d4ed8; transform: scale(1.05); }
#send:disabled { opacity: .4; box-shadow: none; transform: none; }
#send svg { pointer-events: none; }

/* ── Voice overlay ── */
#voice {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 900px 600px at 50% 10%, #0c1528 0%, #07090f 60%);
  display: flex; flex-direction: column; align-items: center;
  padding: 0 18px;
  z-index: 50;
}
.voice-header {
  width: 100%; max-width: 820px;
  height: var(--header-h);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.voice-transcript {
  flex: 1;
  width: 100%; max-width: 600px;
  display: flex; flex-direction: column; justify-content: flex-end;
  gap: 10px;
  overflow: hidden;
  padding: 18px 0;
}
.vmsg {
  font-size: 16px; line-height: 1.55;
  opacity: 0; transform: translateY(10px);
  transition: opacity .35s, transform .35s;
}
.vmsg.show { opacity: 1; transform: none; }
.vmsg .who { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.vmsg.user-v { color: #9fb4d6; text-align: right; }
.vmsg.bot-v { color: #f0f6ff; }
.voice-stage {
  display: flex; flex-direction: column; align-items: center; gap: 18px;
  padding-bottom: 28px;
  flex-shrink: 0;
}

/* Orb */
.orb-wrap { position: relative; width: 220px; height: 220px; display: flex; align-items: center; justify-content: center; }
.orb-ring {
  position: absolute; width: 200px; height: 200px;
  border-radius: 50%; border: 2px solid transparent;
}
.orb-pulse {
  position: absolute; width: 170px; height: 170px;
  border-radius: 50%; border: 2px solid rgba(56,189,248,.4);
  opacity: 0;
}
.orb {
  position: relative; width: 170px; height: 170px; border-radius: 50%;
  cursor: pointer; touch-action: none; user-select: none; -webkit-user-select: none;
  will-change: transform, filter;
  background: radial-gradient(circle at 35% 30%, #fff 0%, #cfe7ff 16%, #5aa6ff 44%, #2563eb 70%, #0a285f 100%);
  box-shadow: 0 0 60px 12px rgba(77,163,255,.45), 0 0 130px 32px rgba(37,99,235,.18),
              inset 0 9px 28px rgba(255,255,255,.45), inset 0 -22px 48px rgba(3,12,40,.6);
  transition: background .5s, box-shadow .35s;
}
.orb::after {
  content: ""; position: absolute; inset: -7%; border-radius: 50%;
  background: conic-gradient(from 0deg, rgba(125,211,252,0), rgba(167,139,250,.35), rgba(56,189,248,0), rgba(96,165,250,.4), rgba(125,211,252,0));
  filter: blur(14px); mix-blend-mode: screen;
  animation: rot 9s linear infinite; opacity: .7; pointer-events: none;
}
@keyframes rot { to { transform: rotate(360deg); } }
.orb.listening {
  background: radial-gradient(circle at 35% 30%, #fff, #d2fbf2 16%, #33d6ee 46%, #06b6d4 72%, #0a4a59 100%);
  box-shadow: 0 0 80px 18px rgba(34,211,238,.55), inset 0 9px 28px rgba(255,255,255,.5), inset 0 -22px 48px rgba(3,22,30,.6);
}
.orb.speaking {
  background: radial-gradient(circle at 35% 30%, #fff, #ecd9ff 16%, #a78bfa 46%, #7c3aed 72%, #2c0f63 100%);
  box-shadow: 0 0 80px 18px rgba(167,139,250,.5), inset 0 9px 28px rgba(255,255,255,.5), inset 0 -22px 48px rgba(20,8,40,.6);
}
.orb-wrap.thinking .orb-ring { border-top-color: #93c5fd; border-right-color: #67e8f9; animation: rot 1s linear infinite; }
.orb-wrap.listening .orb-pulse { animation: pulse 1.7s ease-out infinite; }
@keyframes pulse { 0% { transform: scale(.9); opacity: .5; } 100% { transform: scale(1.55); opacity: 0; } }

#vstatus { font-size: 14px; color: #7da8d6; min-height: 20px; text-align: center; font-weight: 500; }
.v-hint { font-size: 12px; color: var(--muted2); text-align: center; max-width: 260px; line-height: 1.5; }
.v-hint strong { color: var(--muted); font-weight: 600; }

/* ── Waveform canvas ── */
#waveCanvas { width: 100%; max-width: 500px; height: 44px; opacity: .7; display: block; }

/* ── Responsive ── */
@media (max-width: 600px) {
  #app { max-width: 100%; }
  .bubble { font-size: 14.5px; max-width: 88%; }
  .orb, .orb-pulse { width: 150px; height: 150px; }
  .orb-ring { width: 180px; height: 180px; }
  .orb-wrap { width: 200px; height: 200px; }
  #messages { padding: 16px 12px 8px; }
  #bar { padding: 10px 12px 14px; }
  .sug-btn { font-size: 12px; }
  .btn-voice .label-voice { display: none; }
}

/* ── Toast ── */
#toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: #1e293b; border: 1px solid var(--border);
  color: var(--text); font-size: 13px; padding: 9px 18px;
  border-radius: 22px; opacity: 0; transition: opacity .3s;
  pointer-events: none; z-index: 100; white-space: nowrap;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <header>
    <div class="brand">
      <img class="logo" alt="Fencive">
      <span class="label">Assistant</span>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="resetBtn" title="Nouvelle conversation" aria-label="Réinitialiser">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <button class="btn-voice" id="voiceBtn" aria-label="Mode vocal">
        <span class="voice-dot"></span>
        <span class="label-voice">Mode vocal</span>
      </button>
    </div>
  </header>

  <!-- Messages -->
  <div id="messages">
    <div class="welcome" id="welcome">
      <img class="logo" alt="Fencive">
      <p>Bonjour ! Je suis l'assistant Fencive.<br>Je peux vous aider avec votre système <strong>Vanguard</strong>.</p>
      <div class="suggestions" id="suggestions">
        <button class="sug-btn">Comment installer mon Vanguard ?</button>
        <button class="sug-btn">Quelle est la garantie ?</button>
        <button class="sug-btn">Comment connecter l'application ?</button>
        <button class="sug-btn">Mon alarme ne se déclenche pas</button>
        <button class="sug-btn">Comment contacter le support ?</button>
      </div>
    </div>
  </div>

  <!-- Input bar -->
  <form id="bar" autocomplete="off">
    <textarea id="txt" rows="1" placeholder="Écrivez votre message…" aria-label="Message"></textarea>
    <button id="send" type="submit" aria-label="Envoyer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
    </button>
  </form>
</div>

<!-- Voice overlay -->
<div id="voice" class="hidden">
  <div class="voice-header">
    <div class="brand">
      <img class="logo" alt="Fencive">
      <span class="label">Mode vocal</span>
    </div>
    <button class="btn-icon" id="closeV" aria-label="Fermer le mode vocal">✕</button>
  </div>

  <div class="voice-transcript" id="vsub"></div>

  <canvas id="waveCanvas"></canvas>

  <div class="voice-stage">
    <div class="orb-wrap" id="orbWrap">
      <div class="orb-ring"></div>
      <div class="orb-pulse"></div>
      <div class="orb" id="orb"></div>
    </div>
    <div id="vstatus">Initialisation…</div>
    <div class="v-hint"><strong>Maintenez</strong> la sphère pour parler,<br><strong>relâchez</strong> pour envoyer.</div>
  </div>
</div>

<audio id="player" crossorigin="anonymous"></audio>
<div id="toast"></div>

<script>
/* ── Config ── */
const CHAT  = "http://localhost:5678/webhook/chat-bot-fencive/chat";
const VOICE = "http://localhost:5678/webhook/voice-bot-fencive";
const LOGO  = "https://fencive.com/cdn/shop/files/logo_base_f31c08b0-884c-460e-834c-ac98632b88f6.png?height=60";
const SID   = "web-" + Math.random().toString(36).slice(2, 10);
let convo = [];

/* Logo */
document.querySelectorAll(".logo").forEach(el => el.src = LOGO);

/* ── Toast ── */
const toastEl = document.getElementById("toast");
let toastTimer;
function toast(msg, dur = 2500) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove("show"), dur);
}

/* ── Language detection ── */
function detectLang(text) {
  const arabicRange = /[؀-ۿ]/;
  if (arabicRange.test(text)) return "ar";
  return "fr";
}
function langLabel(lang) { return lang === "ar" ? "عربية" : "Français"; }

/* ── Chat ── */
const messagesEl = document.getElementById("messages");
let welcomeEl    = document.getElementById("welcome");

function removeWelcome() {
  if (welcomeEl) { welcomeEl.remove(); welcomeEl = null; }
}

function addBubble(text, who, showLang = false) {
  convo.push({ r: who, t: text });
  removeWelcome();
  const row = document.createElement("div");
  row.className = "row " + who;
  if (who !== "user") {
    const av = document.createElement("img");
    av.className = "avatar"; av.src = LOGO; av.alt = "Fencive";
    row.appendChild(av);
  }
  const b = document.createElement("div");
  b.className = "bubble";
  b.textContent = text;
  row.appendChild(b);
  if (showLang && who === "user") {
    const badge = document.createElement("span");
    badge.className = "lang-badge";
    badge.textContent = langLabel(detectLang(text));
    const wrap = document.createElement("div");
    wrap.style.cssText = "display:flex;flex-direction:column;align-items:flex-end;gap:3px";
    wrap.appendChild(b);
    wrap.appendChild(badge);
    row.appendChild(wrap);
  }
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return row;
}

function addTyping() {
  const row = document.createElement("div");
  row.className = "row bot typing";
  row.innerHTML = '<div class="bubble"><span></span><span></span><span></span></div>';
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return row;
}

/* Suggestions */
document.getElementById("suggestions").addEventListener("click", e => {
  if (e.target.classList.contains("sug-btn")) {
    txtEl.value = e.target.textContent;
    txtEl.dispatchEvent(new Event("input"));
    bar.requestSubmit();
  }
});

/* Reset */
document.getElementById("resetBtn").addEventListener("click", () => {
  convo = [];
  messagesEl.innerHTML = "";
  const w = document.createElement("div");
  w.className = "welcome"; w.id = "welcome";
  w.innerHTML = `<img class="logo" src="${LOGO}" alt="Fencive">
    <p>Bonjour ! Je suis l'assistant Fencive.<br>Je peux vous aider avec votre système <strong>Vanguard</strong>.</p>
    <div class="suggestions" id="suggestions">
      <button class="sug-btn">Comment installer mon Vanguard ?</button>
      <button class="sug-btn">Quelle est la garantie ?</button>
      <button class="sug-btn">Comment connecter l'application ?</button>
      <button class="sug-btn">كيف أشغّل النظام؟</button>
      <button class="sug-btn">Mon alarme ne se déclenche pas</button>
      <button class="sug-btn">Comment contacter le support ?</button>
    </div>`;
  messagesEl.appendChild(w);
  welcomeEl = w;
  document.getElementById("suggestions").addEventListener("click", e => {
    if (e.target.classList.contains("sug-btn")) {
      txtEl.value = e.target.textContent;
      txtEl.dispatchEvent(new Event("input"));
      bar.requestSubmit();
    }
  });
  toast("Conversation réinitialisée");
  txtEl.focus();
});

/* Form submit */
const txtEl  = document.getElementById("txt");
const bar    = document.getElementById("bar");
const sendEl = document.getElementById("send");

txtEl.addEventListener("input", () => {
  txtEl.style.height = "auto";
  txtEl.style.height = Math.min(txtEl.scrollHeight, 120) + "px";
});
txtEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); bar.requestSubmit(); }
});

bar.addEventListener("submit", async e => {
  e.preventDefault();
  const q = txtEl.value.trim();
  if (!q) return;
  txtEl.value = ""; txtEl.style.height = "auto";
  const hist = convo.slice(-6).map(m => (m.r === "user" ? "Client: " : "Assistant: ") + m.t).join("\n");
  addBubble(q, "user", true);
  const ci = hist ? ("Historique de la conversation en cours :\n" + hist + "\n\nNouvelle question du client : " + q) : q;
  sendEl.disabled = true;
  const t = addTyping();
  try {
    const res  = await fetch(CHAT, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ chatInput: ci, sessionId: SID }) });
    const data = await res.json();
    t.remove();
    const reply = (data.text || data.output || data.reponse || "…").toString().trim();
    addBubble(reply, "bot");
  } catch (err) {
    t.remove();
    addBubble("Erreur de connexion. Vérifiez que le bot est bien démarré.", "bot");
  } finally {
    sendEl.disabled = false;
    txtEl.focus();
  }
});

/* ── Voice overlay ── */
const voiceEl  = document.getElementById("voice");
const voiceBtn = document.getElementById("voiceBtn");
const closeV   = document.getElementById("closeV");
const orbEl    = document.getElementById("orb");
const orbWrap  = document.getElementById("orbWrap");
const vstatusEl= document.getElementById("vstatus");
const playerEl = document.getElementById("player");
const waveCanvas = document.getElementById("waveCanvas");
const wctx = waveCanvas.getContext("2d");

let stream, rec, chunks = [], recording = false, state = "idle";
let ac, analyser, dataArr, micSrc, outSrc, activeAnalyser = null, micReady = false;
let waveRaf;

voiceBtn.addEventListener("click", () => {
  voiceEl.classList.remove("hidden");
  if (!micReady) initMic();
  drawWave();
});
closeV.addEventListener("click", () => {
  voiceEl.classList.add("hidden");
  cancelAnimationFrame(waveRaf);
});

function setState(s) {
  state = s;
  orbEl.classList.remove("listening", "speaking");
  orbWrap.classList.remove("thinking", "listening");
  if (s === "listening")  { orbEl.classList.add("listening");  orbWrap.classList.add("listening"); }
  if (s === "thinking")   { orbWrap.classList.add("thinking"); }
  if (s === "speaking")   { orbEl.classList.add("speaking"); }
}

function setStatus(s) { vstatusEl.textContent = s; }

function ensureCtx() {
  if (!ac) {
    ac = new (window.AudioContext || window.webkitAudioContext)();
    analyser = ac.createAnalyser();
    analyser.fftSize = 512;
    dataArr = new Uint8Array(analyser.fftSize);
  }
}

async function initMic() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true } });
    ensureCtx();
    micSrc = ac.createMediaStreamSource(stream);
    micReady = true;
    setStatus("Prêt");
  } catch (e) {
    setStatus("Microphone refusé");
    toast("Accès microphone refusé");
  }
}

/* Waveform */
function drawWave() {
  waveRaf = requestAnimationFrame(drawWave);
  const W = waveCanvas.clientWidth, H = waveCanvas.clientHeight;
  if (waveCanvas.width !== W) waveCanvas.width = W;
  if (waveCanvas.height !== H) waveCanvas.height = H;
  wctx.clearRect(0, 0, W, H);
  if (!activeAnalyser) {
    wctx.strokeStyle = "rgba(99,130,180,.3)";
    wctx.lineWidth = 1.5;
    wctx.beginPath();
    wctx.moveTo(0, H / 2);
    wctx.lineTo(W, H / 2);
    wctx.stroke();
    return;
  }
  activeAnalyser.getByteTimeDomainData(dataArr);
  wctx.strokeStyle = state === "listening" ? "#22d3ee" : state === "speaking" ? "#a78bfa" : "#5aa6ff";
  wctx.lineWidth = 2;
  wctx.shadowColor = state === "listening" ? "#22d3ee" : "#5aa6ff";
  wctx.shadowBlur = 8;
  wctx.beginPath();
  const step = W / dataArr.length;
  for (let i = 0; i < dataArr.length; i++) {
    const y = ((dataArr[i] - 128) / 128) * (H * 0.45) + H / 2;
    i === 0 ? wctx.moveTo(0, y) : wctx.lineTo(i * step, y);
  }
  wctx.stroke();
  wctx.shadowBlur = 0;
}

/* Voice transcript */
const vsubEl = document.getElementById("vsub");
function vAdd(text, who) {
  const d = document.createElement("div");
  d.className = "vmsg " + (who === "user" ? "user-v" : "bot-v");
  d.innerHTML = '<div class="who">' + (who === "user" ? "Vous" : "Fencive") + "</div>" + text.replace(/</g, "&lt;");
  vsubEl.appendChild(d);
  requestAnimationFrame(() => d.classList.add("show"));
  while (vsubEl.children.length > 4) vsubEl.removeChild(vsubEl.firstChild);
}

/* Record */
function startRec(ev) {
  ev.preventDefault();
  if (recording || !micReady) return;
  if (ac.state === "suspended") ac.resume();
  chunks = [];
  try { rec = new MediaRecorder(stream); } catch (e) { return; }
  rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  rec.onstop = processRec;
  rec.start();
  recording = true;
  activeAnalyser = analyser;
  try { micSrc.connect(analyser); } catch (_) {}
  setState("listening");
  setStatus("Je vous écoute…");
}

function stopRec(ev) {
  if (ev) ev.preventDefault();
  if (!recording) return;
  recording = false;
  try { micSrc.disconnect(analyser); } catch (_) {}
  activeAnalyser = null;
  setState("thinking");
  setStatus("Je réfléchis…");
  try { rec.stop(); } catch (e) { setState("idle"); setStatus("Prêt"); }
}

async function processRec() {
  try {
    const blob = new Blob(chunks, { type: (chunks[0] && chunks[0].type) || "audio/webm" });
    const ab   = await blob.arrayBuffer();
    const tmp  = new (window.AudioContext || window.webkitAudioContext)();
    const dec  = await tmp.decodeAudioData(ab);
    tmp.close();
    const wav  = encodeWAV(downsample(dec.getChannelData(0), dec.sampleRate, 16000), 16000);
    setStatus("Envoi…");
    const res  = await fetch(VOICE, { method: "POST", headers: { "Content-Type": "audio/wav" }, body: wav });
    const data = await res.json();
    if (data.transcription) {
      addBubble(data.transcription, "user", true);
      vAdd(data.transcription, "user");
    }
    if (data.reponse) {
      addBubble(data.reponse, "bot");
      vAdd(data.reponse, "bot");
    }
    if (data.audio_base64 && data.audio_base64.length > 100) {
      playB64(data.audio_base64);
    } else {
      setState("idle"); setStatus("Prêt");
    }
  } catch (e) {
    setState("idle"); setStatus("Erreur");
    toast("Erreur de traitement audio");
  }
}

function playB64(b64) {
  try {
    const bin = atob(b64), arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    const url = URL.createObjectURL(new Blob([arr], { type: "audio/wav" }));
    ensureCtx();
    if (ac.state === "suspended") ac.resume();
    if (!outSrc) {
      try { outSrc = ac.createMediaElementSource(playerEl); outSrc.connect(analyser); outSrc.connect(ac.destination); } catch (_) {}
    }
    playerEl.src = url;
    setState("speaking"); setStatus("Fencive répond…");
    activeAnalyser = analyser;
    playerEl.onended = () => {
      activeAnalyser = null; setState("idle"); setStatus("Prêt — à vous !");
      URL.revokeObjectURL(url);
    };
    playerEl.play().catch(() => { setState("idle"); activeAnalyser = null; setStatus("Lecture prête"); });
  } catch (e) { setState("idle"); }
}

/* Audio helpers */
function downsample(b, iR, oR) {
  if (oR >= iR) return b;
  const r = iR / oR, n = Math.round(b.length / r), o = new Float32Array(n);
  for (let i = 0; i < n; i++) o[i] = b[Math.floor(i * r)] || 0;
  return o;
}
function encodeWAV(s, rate) {
  const b = new ArrayBuffer(44 + s.length * 2), v = new DataView(b);
  const w = (o, t) => { for (let i = 0; i < t.length; i++) v.setUint8(o + i, t.charCodeAt(i)); };
  w(0,"RIFF"); v.setUint32(4, 36 + s.length * 2, true); w(8,"WAVE"); w(12,"fmt ");
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,rate,true); v.setUint32(28,rate*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
  w(36,"data"); v.setUint32(40, s.length * 2, true);
  let o = 44;
  for (let i = 0; i < s.length; i++, o += 2) {
    const x = Math.max(-1, Math.min(1, s[i]));
    v.setInt16(o, x < 0 ? x * 0x8000 : x * 0x7FFF, true);
  }
  return new Blob([v], { type: "audio/wav" });
}

/* Orb events */
orbEl.addEventListener("mousedown", startRec);
window.addEventListener("mouseup", stopRec);
orbEl.addEventListener("touchstart", startRec, { passive: false });
window.addEventListener("touchend", stopRec, { passive: false });

/* Init */
txtEl.focus();
